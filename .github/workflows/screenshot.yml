name: Update Screenshot

on:
  push:
    branches: [master]
    paths-ignore:
      - 'README.md'
      - '.github/workflows/screenshot.yml'

jobs:
  screenshot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install chromium --with-deps

      - name: Take screenshot
        run: npm run screenshot

      - name: Upload screenshot to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh release view screenshots &>/dev/null; then
            gh release create screenshots \
              --title "Screenshots" \
              --notes "Game screenshots (auto-updated)" \
              --target master
          fi
          gh release delete-asset screenshots screenshot.png --yes 2>/dev/null || true
          gh release upload screenshots screenshot.png
